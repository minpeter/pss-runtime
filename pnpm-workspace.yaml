packages:
  - "apps/*"
  - "packages/*"
  - "examples/*"
  - "experimental/*"
overrides:
  read-yaml-file: 2.1.0
  typescript: ^7.0.2
  rolldown-plugin-dts: 0.27.2
  vite: 8.1.0
allowBuilds:
  core-js-pure: true
  esbuild: true
  sharp: true
  workerd: true
minimumReleaseAgeExclude:
  - typescript
  - '@typescript/*'
  - rolldown-plugin-dts
  - '@ai-sdk/gateway@4.0.22'
  - '@ai-sdk/openai-compatible@3.0.11'
  - ai@7.0.30
