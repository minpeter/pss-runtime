<svg
  aria-labelledby="title desc"
  height="1050"
  role="img"
  viewBox="0 0 1400 1050"
  width="1400"
  xmlns="http://www.w3.org/2000/svg"
>
  <title id="title">Live cache-policy tuning follow-up</title>
  <desc id="desc">
    A comparison of the original 75K stable-prefix policy, a uniform 60K policy,
    and an exploratory route-aware policy across combined evidence from 312
    logical turns and 341 HTTP attempts. The route-aware measured composite
    reached 100 percent exact-token accuracy, 38.34 percent cache hit, and a
    12.798 second p95.
  </desc>
  <defs>
    <linearGradient id="selected" x1="0" x2="1">
      <stop offset="0" stop-color="#0f766e" />
      <stop offset="1" stop-color="#10b981" />
    </linearGradient>
    <linearGradient id="uniform" x1="0" x2="1">
      <stop offset="0" stop-color="#1d4ed8" />
      <stop offset="1" stop-color="#38bdf8" />
    </linearGradient>
    <filter height="130%" id="shadow" width="130%" x="-15%" y="-15%">
      <feDropShadow
        dx="0"
        dy="4"
        flood-color="#0f172a"
        flood-opacity="0.08"
        stdDeviation="8"
      />
    </filter>
