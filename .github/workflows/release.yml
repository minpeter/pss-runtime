name: Release

on:
  push:
    branches:
      - main
      - v0.1
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Changesets release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Verify npm trusted publishing prerequisites
        run: |
          node --version
          npm --version
          node <<'NODE'
          const { execFileSync } = require("node:child_process");
          const version = execFileSync("npm", ["--version"], {
            encoding: "utf8",
          }).trim();
          const [major, minor, patch] = version.split(".").map(Number);
          const valid = major > 11 || (major === 11 && (minor > 5 || (minor === 5 && patch >= 1)));
          if (!valid) {
            throw new Error(`npm CLI 11.5.1+ is required for trusted publishing; found ${version}`);
          }
          NODE

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check package boundaries
        run: pnpm boundaries

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Verify release artifacts
        run: pnpm verify:release

      - name: Create release pull request or publish
        if: github.ref_name == 'main'
        uses: changesets/action@v1
        with:
          publish: pnpm release
        env:
          # npm publish is authenticated by npm Trusted Publishing/OIDC.
          # Configure each package on npm with repository minpeter/pss-next
          # and workflow filename release.yml; do not add NPM_TOKEN.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create next release pull request or publish
        if: github.ref_name == 'v0.1'
        uses: changesets/action@v1
        with:
          publish: pnpm release:next
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
