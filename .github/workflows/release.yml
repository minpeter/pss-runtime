name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Version and publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check package boundaries
        run: pnpm boundaries

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Verify release artifacts
        run: pnpm verify:release

      - name: Version or publish packages
        run: pnpm tegami ci
        env:
          # npm publish is authenticated by npm Trusted Publishing/OIDC.
          # Configure each package on npm with repository minpeter/pss-runtime
          # and workflow filename release.yml; do not add NPM_TOKEN.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
